name: CI
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install ruff
      - run: ruff check app/ pipelines/ tests/ benchmarks/
      - run: ruff format --check app/ pipelines/ tests/ benchmarks/

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - run: pip install -e ".[dev]"
      - name: Cache embedding model
        uses: actions/cache@v4
        with:
          path: ~/.cache/huggingface
          key: hf-all-MiniLM-L6-v2
      - name: Pre-download embedding model (patient retry past HF rate limits)
        run: |
          for i in 1 2 3 4 5; do
            python -c "from sentence_transformers import SentenceTransformer; SentenceTransformer('all-MiniLM-L6-v2')" && break
            echo "embedding-model download attempt $i failed; backing off 30s"; sleep 30
          done
      - run: pytest -q -m "not integration" --tb=short --cov=app --cov=pipelines --cov-report=xml
      - uses: codecov/codecov-action@v4
        if: always()
        with:
          file: ./coverage.xml
        continue-on-error: true

  typecheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - run: pip install -e ".[dev]"
      - run: mypy app/ --ignore-missing-imports

  docker:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: docker compose build
